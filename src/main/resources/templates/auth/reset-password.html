<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - School Management</title>

    <!-- FontAwesome Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ===== Reset Password Page (rp- prefix to avoid conflicts) ===== */

        body.rp-body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0d47a1, #1565c0);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .rp-container {
            background: #1565c0;
            padding: 40px;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
            animation: rpFloat 0.6s ease;
        }

        .rp-container h2 {
            margin-bottom: 10px;
        }

        .rp-subtext {
            font-size: 14px;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .rp-input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .rp-input-group label {
            font-size: 14px;
            display: block;
            margin-bottom: 6px;
        }

        .rp-password-field {
            position: relative;
        }

        .rp-password-field input {
    width: 100%;
    padding: 12px 40px 12px 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 14px;
    box-sizing: border-box;   /* ✅ This prevents overflow */
}

        .rp-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #1565c0;
        }

        .rp-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: white;
            color: #1565c0;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .rp-btn:hover {
            background: #e3f2fd;
            transform: translateY(-2px);
        }

        @keyframes rpFloat {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .rp-container {
                width: 90%;
                padding: 25px;
            }
        }
    </style>
</head>

<body class="rp-body">

<div class="rp-container">

    <h2>Reset Password</h2>
    <p class="rp-subtext">
        Create a new secure password for your account.
    </p>

    <form method="post" action="/reset-password">

        <input type="hidden" name="token" th:value="${token}">

        <!-- New Password -->
        <div class="rp-input-group">
            <label>New Password</label>
            <div class="rp-password-field">
                <input type="password"
                       id="newPassword"
                       name="newPassword"
                       placeholder="Enter new password"
                       required>
                <span class="rp-toggle"
                      onclick="togglePassword('newPassword', this)">
                    <i class="fa-solid fa-eye"></i>
                </span>
            </div>
        </div>

        <!-- Confirm Password -->
        <div class="rp-input-group">
            <label>Confirm Password</label>
            <div class="rp-password-field">
                <input type="password"
                       id="confirmPassword"
                       name="confirmPassword"
                       placeholder="Confirm password"
                       required>
                <span class="rp-toggle"
                      onclick="togglePassword('confirmPassword', this)">
                    <i class="fa-solid fa-eye"></i>
                </span>
            </div>
        </div>

        <button type="submit" class="rp-btn">
            Reset Password
        </button>

    </form>

</div>

<script>
    function togglePassword(fieldId, element) {
        const input = document.getElementById(fieldId);
        const icon = element.querySelector("i");

        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }
</script>

</body>
</html>
