<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - School Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <style>
    /* ===== Forgot Password Page ===== */

:root {
    --primary-blue: #0b3d91;
    --dark-yellow: #d4a017;
    --light-brown: #f1e5d0;
    --white: #ffffff;
    --dark-text: #1c1c1c;
}


.fp-body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--light-brown);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.fp-body::after {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 55%;
    height: 100%;
    background: linear-gradient(135deg, #003366, #0d6efd);

    border-top-left-radius: 120px;
    border-bottom-left-radius: 120px;

    z-index: -1;
}


.fp-container {
    background: #1565c0; /* Primary Blue */
    padding: 40px;
    width: 380px;
    border-radius: 15px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    text-align: center;
    color: white;
    animation: floatUp 0.6s ease;
}

.fp-container h2 {
    margin-bottom: 10px;
}

.fp-subtext {
    font-size: 14px;
    margin-bottom: 20px;
    opacity: 0.9;
}

.fp-input-group {
    text-align: left;
    margin-bottom: 20px;
}

.fp-input-group label {
    font-size: 14px;
}

.fp-input-group input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: none;
    outline: none;
}

.fp-btn {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: white;
    color: #1565c0;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.fp-btn:hover {
    background: #e3f2fd;
    transform: translateY(-2px);
}

.fp-back {
    margin-top: 15px;
}

.fp-back a {
    color: white;
    font-size: 14px;
    text-decoration: none;
}

.fp-back a:hover {
    text-decoration: underline;
}

.fp-success {
    background: #e8f5e9;
    color: #2e7d32;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
}

.fp-error {
    background: #ffebee;
    color: #c62828;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
}

@keyframes floatUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
    </style>
    
</head>
<body class="fp-body">

<div class="fp-container">

    <h2>Forgot Password</h2>
    <p class="fp-subtext">Enter your registered email to receive reset instructions.</p>

    <!-- ✅ Success Message -->
    <div th:if="${success}" class="fp-success">
        <p th:text="${success}"></p>
    </div>

    <!-- ❌ Error Message -->
    <div th:if="${error}" class="fp-error">
        <p th:text="${error}"></p>
    </div>

    <form method="post" th:action="@{/forgot-password}" class="fp-form">

        <div class="fp-input-group">
            <label>Email Address</label>
            <input type="email" name="email"
                   placeholder="Enter your email"
                   required>
        </div>

        <button type="submit" class="fp-btn">
            Send Reset Link
        </button>

    </form>

    <div class="fp-back">
        <a th:href="@{/login}">← Back to Login</a>
    </div>

</div>

</body>
</html>
