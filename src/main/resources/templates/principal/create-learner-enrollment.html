<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Learner Enrollment</title>
</head>

<body>

<h2>Enroll Learner</h2>

<a th:href="@{/principal/dashboard}">Back</a>

<div th:if="${error}" style="color:red">
<p th:text="${error}"></p>
</div>

<form th:action="@{/principal/learner-enrollment/create}" method="post">

<label>Select Learner</label>
<select name="learnerId" required>

<option value="">Select Learner</option>

<option th:each="l : ${learners}"
        th:value="${l.id}"
        th:text="${l.username}">
</option>

</select>

<br><br>

<label>Select Class</label>
<select id="classSelect">

<option value="">Select Class</option>

<option th:each="c : ${classrooms}"
        th:value="${c.id}"
        th:text="${c.name}">
</option>

</select>

<br><br>

<label>Select Section</label>
<select name="sectionId" id="sectionSelect" required>

<option value="">Select Section</option>

</select>

<br><br>

<button type="submit">Enroll</button>

</form>

<script>

document.getElementById("classSelect").addEventListener("change", function(){

let classId = this.value;

if(!classId) return;

fetch("/principal/sections-by-classroom/" + classId)
.then(res => res.json())
.then(data => {

let sectionSelect = document.getElementById("sectionSelect");

sectionSelect.innerHTML = "";

data.forEach(section => {

let option = document.createElement("option");

option.value = section.id;

option.text = section.name;

sectionSelect.appendChild(option);

});

});

});

</script>

</body>

</html>
