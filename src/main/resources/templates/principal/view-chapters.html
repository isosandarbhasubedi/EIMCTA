<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{/principal/layout/base :: html}">

<!-- PAGE CSS -->
<th:block th:fragment="pageCss">
    <link rel="stylesheet" th:href="@{/css/principal/chapters.css}">
</th:block>
<body>
<div th:with="activePage='chapter'">

    <div th:fragment="content">

        <h2 class="page-title">Chapters</h2>

        <!-- Messages -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <!-- Search Form -->
        <div class="search-card">
            <form th:action="@{/principal/chapters/search}" method="get" class="search-form">
                <input type="text" name="keyword" placeholder="Search chapter..." th:value="${keyword}">
                <button type="submit" class="search-btn">Search</button>
                <a th:href="@{/principal/chapters}" class="reset-btn">Reset</a>
            </form>
        </div>

        <!-- Table Card -->
        <div class="table-card">
            <table class="chapters-table">
                <thead>
                    <tr>
                        <th>Chapter</th>
                        <th>Unit</th>
                        <th>Subject</th>
                        <th>Section</th>
                        <th>Class</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="chapter, stat : ${chapters}">
                        <td th:text="${chapter.name}"></td>
                        <td th:text="${chapter.unit.name}"></td>
                        <td th:text="${chapter.unit.subject.name}"></td>
                        <td th:text="${chapter.unit.subject.section.name}"></td>
                        <td th:text="${chapter.unit.subject.section.classRoom.name}"></td>
                        <td>
                            <a th:href="@{/principal/chapters/edit/{id}(id=${chapter.id})}" class="action-btn edit">Edit</a>
                            |
                            <a th:href="@{/principal/chapters/delete/{id}(id=${chapter.id})}" 
                               class="action-btn delete"
                               onclick="return confirm('Delete chapter?')">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>
<!-- PAGE JS -->
<th:block th:fragment="pageJs">
<script>

</script>
</th:block>
</body>
</html>
