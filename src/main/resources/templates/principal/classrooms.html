<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{/principal/layout/base :: html}">

<!-- PAGE CSS -->
<th:block th:fragment="pageCss">
<link rel="stylesheet" th:href="@{/css/principal/manage-classrooms.css}">
</th:block>
<body>
<div th:with="activePage='classroom'">

<div th:fragment="content">

<h1 class="page-title">Classroom Management</h1>

<!-- Success / Error Messages -->
<div th:if="${success}" class="alert-success" th:text="${success}"></div>
<div th:if="${error}" class="alert-error" th:text="${error}"></div>

<!-- Search Section -->
<div class="search-bar">

<form th:action="@{/principal/classrooms/search}" method="get">

<input type="text"
       name="keyword"
       placeholder="Search classrooms..."
       th:value="${keyword}">

<button type="submit" class="btn-search">
Search
</button>

<a th:href="@{/principal/classrooms}" class="btn-reset">
Reset
</a>

</form>

</div>


<!-- Table Card -->
<div class="table-card">

<table class="dashboard-table">

<thead>
<tr>
<th>#</th>
<th>Class Name</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

<tr th:each="classRoom, stat : ${classrooms}">
<td th:text="${stat.index + 1}"></td>

<td th:text="${classRoom.name}"></td>

<td>

<a class="btn-edit"
   th:href="@{/principal/classrooms/edit/{id}(id=${classRoom.id})}">
Edit
</a>

<a class="btn-delete"
   th:href="@{/principal/classrooms/delete/{id}(id=${classRoom.id})}"
   onclick="return confirm('Are you sure you want to delete this classroom?');">
Delete
</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>


<!-- PAGE JS -->
<th:block th:fragment="pageJs">
<script>
console.log("Manage Classrooms Loaded");
</script>
</th:block>
</body>
</html>
