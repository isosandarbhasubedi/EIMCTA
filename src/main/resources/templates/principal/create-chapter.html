<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{/principal/layout/base :: html}">

<!-- PAGE CSS -->
<th:block th:fragment="pageCss">
    <link rel="stylesheet" th:href="@{/css/principal/create-chapter.css}">
</th:block>
<body>
<div th:with="activePage='chapter'">

    <div th:fragment="content">

        <h2 class="page-title">Create Chapter</h2>

        <div class="form-card">
            <a th:href="@{/principal/dashboard}" class="back-link">
                <i class="fa fa-arrow-left"></i> Back to Dashboard
            </a>

            <form th:action="@{/principal/chapters/create}" method="post">
<div th:if="${errorMessage}" style="color:red;">
    <p th:text="${errorMessage}"></p>
</div>

<div th:if="${successMessage}" style="color:green;">
    <p th:text="${successMessage}"></p>
</div>
                <!-- Classroom -->
                <label for="classroomSelect">Select Classroom</label>
                <select id="classroomSelect" required>
                    <option value="">Select Classroom</option>
                    <option th:each="c : ${classrooms}"
                            th:value="${c.id}" th:text="${c.name}">
                    </option>
                </select>

                <!-- Section -->
                <label for="sectionSelect">Select Section</label>
                <select id="sectionSelect" required>
                    <option value="">Select Section</option>
                </select>

                <!-- Subject -->
                <label for="subjectSelect">Select Subject</label>
                <select id="subjectSelect" required>
                    <option value="">Select Subject</option>
                </select>

                <!-- Unit -->
                <label for="unitSelect">Select Unit</label>
                <select id="unitSelect" name="unitId" required>
                    <option value="">Select Unit</option>
                </select>

                <!-- Chapter Name -->
                <label for="chapterName">Chapter Name</label>
                <input type="text" id="chapterName" name="chapterName" placeholder="Enter chapter name" required>

                <button type="submit" class="submit-btn">Create Chapter</button>

            </form>
        </div>

    </div>

</div>

<!-- PAGE JS -->
<th:block th:fragment="pageJs">
<script th:src="@{/js/principal/create-chapter.js}"></script>
</th:block>
</body>
</html>
