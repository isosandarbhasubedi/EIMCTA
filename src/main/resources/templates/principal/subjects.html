<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{/principal/layout/base :: html}">

<!-- PAGE CSS -->
<th:block th:fragment="pageCss">
<link rel="stylesheet" th:href="@{/css/principal/manage-subjects.css}">
</th:block>
<body>
<div th:with="activePage='subject'">

<div th:fragment="content">

<h1 class="page-title">Subjects Management</h1>

<!-- Alerts -->
<div th:if="${success}" class="alert-success" th:text="${success}"></div>
<div th:if="${error}" class="alert-error" th:text="${error}"></div>

<!-- Search Bar -->
<div class="search-bar">
    <form th:action="@{/principal/subjects/search}" method="get">
        <input type="text" name="keyword" placeholder="Search subjects..." th:value="${keyword}">
        <button type="submit" class="btn-search">Search</button>
        <a th:href="@{/principal/subjects}" class="btn-reset">Reset</a>
    </form>
</div>

<!-- Table Card -->
<div class="table-card">

<table class="dashboard-table">
<thead>
<tr>
<th>#</th>
<th>Subject Name</th>
<th>Section</th>
<th>Class</th>
<th>Actions</th>
</tr>
</thead>

<tbody>
<tr th:each="subject, stat : ${subjects}">
<td th:text="${stat.index + 1}"></td>
<td th:text="${subject.name}"></td>
<td th:text="${subject.section.name}"></td>
<td th:text="${subject.section.classRoom.name}"></td>
<td>
<a class="btn-edit" th:href="@{/principal/subjects/edit/{id}(id=${subject.id})}">Edit</a>
<a class="btn-delete" th:href="@{/principal/subjects/delete/{id}(id=${subject.id})}" 
   onclick="return confirm('Are you sure you want to delete this subject?');">Delete</a>
</td>
</tr>
</tbody>
</table>

</div>

</div>

</div>

<!-- PAGE JS -->
<th:block th:fragment="pageJs">
<script>
console.log("Manage Subjects Loaded");
</script>
</th:block>
</body>
</html>
