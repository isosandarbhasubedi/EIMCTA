<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{/principal/layout/base :: html}">

<!-- PAGE CSS -->
<th:block th:fragment="pageCss">
<link rel="stylesheet" th:href="@{/css/principal/dashboard.css}">
</th:block>

<body>
<div th:with="activePage='dashboard'">

<div th:fragment="content">

<h1 class="page-title">Dashboard</h1>


<!-- Dashboard Cards -->

<div class="dashboard-cards">

<div class="card card-blue">
<h3>Total Learners</h3>
<p th:text="${#lists.size(learners)}"></p>
</div>

<div class="card card-orange">
<h3>Total Educators</h3>
<p th:text="${#lists.size(educators)}"></p>
</div>

<div class="card card-brown">
<h3>Total Members</h3>
<p th:text="${#lists.size(totalmembers)}"></p>
</div>

</div>


<!-- Educator Table -->

<div class="dashboard-section">

<div class="section-header">
<h2>Educators</h2>
</div>

<div class="table-container">

<table class="dashboard-table">

<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Email</th>
</tr>
</thead>

<tbody>

<tr th:each="educator, stat : ${educators}">
<td th:text="${stat.index + 1}"></td>
<td th:text="${educator.username}"></td>
<td th:text="${educator.email}"></td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>


<!-- PAGE JS -->
<th:block th:fragment="pageJs">
<script>
console.log("Dashboard Page Loaded");
</script>
</th:block>
</body>
</html>
