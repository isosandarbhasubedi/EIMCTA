<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{/principal/layout/base :: html}">

<!-- PAGE CSS -->
<th:block th:fragment="pageCss">
    <link rel="stylesheet" th:href="@{/css/principal/assign-educator.css}">
</th:block>
<body>
<div th:with="activePage='educator'">

    <div th:fragment="content">

        <h2 class="page-title">Assign Educator</h2>

        <!-- Form Card -->
        <div class="form-card">
            <form th:action="@{/principal/educator-assignment/create}" method="post">
<div th:if="${errorMessage}" style="color:red; margin-bottom:10px;">
    <p th:text="${errorMessage}"></p>
</div>

<div th:if="${successMessage}" style="color:green; margin-bottom:10px;">
    <p th:text="${successMessage}"></p>
</div>
                <!-- Educator -->
                <label>Select Educator</label>
                <select name="educatorId" required>
                    <option value="">Select Educator</option>
                    <option th:each="e : ${educators}" th:value="${e.id}" th:text="${e.username}"></option>
                </select>

                <!-- Class -->
                <label>Select Class</label>
                <select id="classSelect">
                    <option value="">Select Class</option>
                    <option th:each="c : ${classrooms}" th:value="${c.id}" th:text="${c.name}"></option>
                </select>

                <!-- Sections -->
                <label>Select Sections</label>
                <div id="sectionContainer" class="checkbox-container"></div>

                <!-- Subjects -->
                <label>Select Subjects</label>
                <div id="subjectContainer" class="checkbox-container"></div>

                <button type="submit" class="submit-btn">Assign Educator</button>

            </form>
        </div>

    </div>
</div>
<!-- PAGE JS -->
<th:block th:fragment="pageJs">
<script th:src="@{/js/principal/assign-educator.js}"></script>
</th:block>
</body>
</html>
