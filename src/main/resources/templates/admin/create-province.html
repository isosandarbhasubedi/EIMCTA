<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Province</title>
</head>
<body>

<h2>Create Province</h2>

<a th:href="@{/admin/dashboard}">Back to Dashboard</a>

<form th:action="@{/admin/provinces/create}" 
      th:object="${province}" 
      method="post">

    <div>
        <label>Province Name:</label>
        <input type="text" th:field="*{name}" required />
    </div>

    <div>
        <button type="submit">Add Province</button>
    </div>

    <div th:if="${error}">
        <p style="color:red;" th:text="${error}"></p>
    </div>

</form>

</body>
</html>
