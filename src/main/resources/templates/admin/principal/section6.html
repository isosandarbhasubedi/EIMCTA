<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Section 6: Attachments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="container mt-5">

<h3>Section 6: Upload Attachments</h3>
<hr>

<form th:action="@{/admin/principal/{userId}/section/6(userId=${principal.user.id})}" 
      method="post" enctype="multipart/form-data">

    <!-- Single Files -->
    <div class="mb-3">
        <label class="form-label">Principal Photo</label>
        <input type="file" name="photoFile" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Citizenship Certificate</label>
        <input type="file" name="citizenshipFile" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">CV / Resume</label>
        <input type="file" name="cvFile" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Recommendation Letter</label>
        <input type="file" name="recommendationFile" class="form-control">
    </div>

    <hr>

    <!-- Multiple Files -->
    <div class="mb-3">
        <label class="form-label">Educational Certificates</label>
        <div id="educationCertificatesWrapper">
            <input type="file" name="educationCertificates" class="form-control mb-2">
        </div>
        <button type="button" class="btn btn-secondary btn-sm" id="addEducationCert">+ Add More</button>
    </div>

    <div class="mb-3">
        <label class="form-label">Experience Letters</label>
        <div id="experienceLettersWrapper">
            <input type="file" name="experienceLetters" class="form-control mb-2">
        </div>
        <button type="button" class="btn btn-secondary btn-sm" id="addExperienceLetter">+ Add More</button>
    </div>

    <div class="mb-3">
        <label class="form-label">Evidence of Trainings / Seminars / Workshops Attended</label>
        <div id="trainingWrapper">
            <input type="file" name="trainingFiles" class="form-control mb-2">
        </div>
        <button type="button" class="btn btn-secondary btn-sm" id="addTrainingFile">+ Add More</button>
    </div>

    <div class="mb-3">
        <label class="form-label">SWOT Analysis / Research / CPD</label>
        <div id="swotWrapper">
            <input type="file" name="swotFiles" class="form-control mb-2">
        </div>
        <button type="button" class="btn btn-secondary btn-sm" id="addSwotFile">+ Add More</button>
    </div>

    <button type="submit" class="btn btn-primary">Save & Continue →</button>
</form>

<script>
$(document).ready(function() {
    // Function to add more file inputs dynamically
    function addFileInput(wrapperId, inputName) {
        const inputHtml = `<div class="mb-2">
            <input type="file" name="${inputName}" class="form-control">
            <button type="button" class="btn btn-danger btn-sm removeFile mt-1">Remove</button>
        </div>`;
        $(wrapperId).append(inputHtml);
    }

    // Add buttons
    $('#addEducationCert').click(function() { addFileInput('#educationCertificatesWrapper', 'educationCertificates'); });
    $('#addExperienceLetter').click(function() { addFileInput('#experienceLettersWrapper', 'experienceLetters'); });
    $('#addTrainingFile').click(function() { addFileInput('#trainingWrapper', 'trainingFiles'); });
    $('#addSwotFile').click(function() { addFileInput('#swotWrapper', 'swotFiles'); });

    // Remove button functionality
    $(document).on('click', '.removeFile', function() {
        $(this).parent().remove();
    });
});
</script>

</body>
</html>
