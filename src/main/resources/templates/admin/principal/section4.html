<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Section 3 - Work Experience</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="container mt-5">

<h3>Section 3 - Work Experience</h3>
<form th:action="@{/admin/principal/{userId}/section/4(userId=${principal.user.id})}" 
      th:object="${principal}" method="post">

    <h4>Current Job Information</h4>


    <div class="mb-3">
        <label>Working Hours</label>
        <input type="text" th:field="*{currentJob.workingHours}" class="form-control" required>
    </div>

    <hr>

    <h5>Periods & Subjects</h5>

    <table class="table table-bordered" id="jobTable">
        <thead>
            <tr>
                <th>Period Number</th>
                <th>Subject</th>
                <th>Learners Number</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="detail, iterStat : ${principal.currentJob.jobDetails}">
                <td>
                    <input type="text" 
                           th:field="*{currentJob.jobDetails[__${iterStat.index}__].periodNumber}" 
                           class="form-control">
                </td>
                <td>
                    <input type="text" 
                           th:field="*{currentJob.jobDetails[__${iterStat.index}__].subject}" 
                           class="form-control">
                </td>
                <td>
                    <input type="text" 
                           th:field="*{currentJob.jobDetails[__${iterStat.index}__].learnersNumber}" 
                           class="form-control">
                </td>
                 <td>
                    <input type="text" 
                           th:field="*{currentJob.jobDetails[__${iterStat.index}__].level}" 
                           class="form-control">
                </td>
                <td>
                    <button type="button" class="btn btn-danger removeRow">Remove</button>
                </td>
            </tr>
        </tbody>
    </table>

    <button type="button" class="btn btn-secondary" id="addRowBtn">+ Add Row</button>

    <br><br>
    <button type="submit" class="btn btn-primary">Save & Continue →</button>
</form>

<script>
let index = document.querySelectorAll("#jobTable tbody tr").length;

document.getElementById("addRowBtn").addEventListener("click", function() {

    const row = `
    <tr>
        <td><input type="text" name="currentJob.jobDetails[${index}].periodNumber" class="form-control"></td>
        <td><input type="text" name="currentJob.jobDetails[${index}].subject" class="form-control"></td>
        <td><input type="text" name="currentJob.jobDetails[${index}].learnersNumber" class="form-control"></td>
        <td><input type="text" name="currentJob.jobDetails[${index}].level" class="form-control"></td>
        <td><button type="button" class="btn btn-danger removeRow">Remove</button></td>
    </tr>
    `;

    document.querySelector("#jobTable tbody").insertAdjacentHTML("beforeend", row);
    index++;
});

document.addEventListener("click", function(e) {
    if (e.target.classList.contains("removeRow")) {
        e.target.closest("tr").remove();
    }
});
</script>



</body>
</html>
