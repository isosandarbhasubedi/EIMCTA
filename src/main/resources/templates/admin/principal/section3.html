<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Section 3 - Work Experience</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="container mt-5">

<h3>Section 3 - Work Experience</h3>
<hr>

<form th:action="@{/admin/principal/{userId}/section/3(userId=${principal.user.id})}"
      th:object="${principal}"
      method="post">

    <div id="workContainer">

        <!-- Existing Work Experiences -->
        <div th:each="exp, expStat : ${principal.workExperiences}"
             class="border p-3 mb-4 work-block">

            <h5>Work Experience [[${expStat.index + 1}]]</h5>

            <div class="row">
                <div class="col-md-3 mb-2">
                    <label>Grade</label>
                    <input type="text"
                           th:field="*{workExperiences[__${expStat.index}__].grade}"
                           class="form-control">
                </div>

                <div class="col-md-3 mb-2">
                    <label>Subjects</label>
                    <input type="text"
                           th:field="*{workExperiences[__${expStat.index}__].subjects}"
                           class="form-control">
                </div>

                <div class="col-md-2 mb-2">
                    <label>Start Date</label>
                    <input type="text"
                           th:field="*{workExperiences[__${expStat.index}__].startDate}"
                           class="form-control">
                </div>

                <div class="col-md-2 mb-2">
                    <label>End Date</label>
                    <input type="text"
                           th:field="*{workExperiences[__${expStat.index}__].endDate}"
                           class="form-control">
                </div>

                <div class="col-md-2 mb-2">
                    <label>Organization</label>
                    <input type="text"
                           th:field="*{workExperiences[__${expStat.index}__].organizationName}"
                           class="form-control">
                </div>
            </div>

            <!-- Tools Section -->
            <div class="mt-3">
                <label>Tools Used</label>
                <div class="tools-container">

                    <div th:each="tool, toolStat : ${exp.tools}">
                        <input type="text"
                               th:name="'workExperiences[' + ${expStat.index} + '].tools[' + ${toolStat.index} + ']'"
                               th:value="${tool}"
                               class="form-control mb-2">
                    </div>

                </div>

                <button type="button"
                        class="btn btn-sm btn-secondary addToolBtn mt-2">
                    + Add Tool
                </button>
            </div>

            <button type="button"
                    class="btn btn-danger btn-sm mt-3 removeWorkBtn">
                Remove Work Experience
            </button>

        </div>

    </div>

    <button type="button" id="addWorkBtn" class="btn btn-dark">
        + Add Work Experience
    </button>

    <hr>

    <button type="submit" class="btn btn-primary">
        Save & Continue →
    </button>

</form>

<script>
$(document).ready(function () {

    let workIndex = $('.work-block').length;

    // Add Work Experience
    $('#addWorkBtn').click(function () {

        let block = `
        <div class="border p-3 mb-4 work-block">

            <h5>Work Experience ${workIndex + 1}</h5>

            <div class="row">
                <div class="col-md-3 mb-2">
                    <label>Grade</label>
                    <input type="text" name="workExperiences[${workIndex}].grade" class="form-control">
                </div>

                <div class="col-md-3 mb-2">
                    <label>Subjects</label>
                    <input type="text" name="workExperiences[${workIndex}].subjects" class="form-control">
                </div>

                <div class="col-md-2 mb-2">
                    <label>Start Date</label>
                    <input type="text" name="workExperiences[${workIndex}].startDate" class="form-control">
                </div>

                <div class="col-md-2 mb-2">
                    <label>End Date</label>
                    <input type="text" name="workExperiences[${workIndex}].endDate" class="form-control">
                </div>

                <div class="col-md-2 mb-2">
                    <label>Organization</label>
                    <input type="text" name="workExperiences[${workIndex}].organizationName" class="form-control">
                </div>
            </div>

            <div class="mt-3">
                <label>Tools Used</label>
                <div class="tools-container"></div>
                <button type="button" class="btn btn-sm btn-secondary addToolBtn mt-2">
                    + Add Tool
                </button>
            </div>

            <button type="button" class="btn btn-danger btn-sm mt-3 removeWorkBtn">
                Remove Work Experience
            </button>
        </div>
        `;

        $('#workContainer').append(block);
        workIndex++;
    });

    // Remove Work Experience
    $(document).on('click', '.removeWorkBtn', function () {
        $(this).closest('.work-block').remove();
    });

    // Add Tool inside specific Work Experience
    $(document).on('click', '.addToolBtn', function () {

        let workBlock = $(this).closest('.work-block');
        let currentIndex = $('.work-block').index(workBlock);
        let toolsContainer = workBlock.find('.tools-container');
        let toolIndex = toolsContainer.children().length;

        let toolInput = `
            <input type="text"
                   name="workExperiences[${currentIndex}].tools[${toolIndex}]"
                   class="form-control mb-2"
                   placeholder="Tool name">
        `;

        toolsContainer.append(toolInput);
    });

});
</script>

</body>
</html>
