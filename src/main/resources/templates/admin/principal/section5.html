<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Principal Section 5 - Capability Rating</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h3>Section 5: Capability Rating</h3>
<hr>

<form th:action="@{/admin/principal/{userId}/section/5(userId=${principal.user.id})}"
      th:object="${principal}"
      method="post">

    <!-- ================= Communication ================= -->
    <h5 class="mt-4">Communication Skills</h5>
    <div class="row g-3">

        <div class="col-md-4">
            <label>Voice & Gesture</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.voiceGesture}"
                   class="form-control" required>
        </div>

        <div class="col-md-4">
            <label>Phonetics</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.phonetics}"
                   class="form-control">
        </div>

        <div class="col-md-4">
            <label>Fluency- Nepali Language</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.fluencyNepali}"
                   class="form-control">
        </div>

        <div class="col-md-4">
            <label>Fluency- English Language</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.fluencyEnglish}"
                   class="form-control">
        </div>

        <div class="col-md-4">
            <label>Clarity</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.clarity}"
                   class="form-control">
        </div>

        <div class="col-md-4">
            <label>Modulation(High/Low)</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.modulation}"
                   class="form-control">
        </div>
        
         <div class="col-md-4">
            <label>Use of idiolect</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.idiolectUse}"
                   class="form-control">

    </div>
    
    <div class="col-md-4">
            <label>Hearing Capacity</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.hearingCapacity}"
                   class="form-control">

    </div>
    </div>


    <!-- ================= Writing ================= -->
    <h5 class="mt-5">Writing & Language Skills</h5>
    <div class="row g-3">

        <div class="col-md-4">
            <label>Handwriting</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.handwriting}"
                   class="form-control">
        </div>

        <div class="col-md-4">
            <label>Grammar</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.grammar}"
                   class="form-control">
        </div>

        <div class="col-md-4">
            <label>Sentence Structure</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.sentenceStructure}"
                   class="form-control">
        </div>

        <div class="col-md-4">
            <label>Writing Speed</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.wiritngSpeed}"
                   class="form-control">
        </div>

        <div class="col-md-4">
            <label>Vocabulary Usage</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.vocabularyUsage}"
                   class="form-control">
        </div>
        
         <div class="col-md-4">
            <label>Sentence Formation</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.sentenceFormation}"
                   class="form-control">
        </div>

    </div>

      
       <!-- ================= Seeing, Hearing and Others ================= -->
    <h5 class="mt-5">Seeing, Hearing & Others</h5>
    <div class="row g-3">

        <div class="col-md-4">
            <label>Visibility</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.visibility}"
                   class="form-control">
        </div>

        <div class="col-md-4">
            <label>Listening</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.listening}"
                   class="form-control">
        </div>

        <div class="col-md-4">
            <label>Temperament</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.temperament}"
                   class="form-control">
        </div>
    </div>
    
    
     <!-- ================= Inter-personal Skills ================= -->
    <h5 class="mt-5">Inter-personal Skills</h5>
    <div class="row g-3">

        <div class="col-md-4">
            <label>Leadership Skills</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.leadershipSkills}"
                   class="form-control">
        </div>

        <div class="col-md-4">
            <label>Teamwork</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.teamwork}"
                   class="form-control">
        </div>

        <div class="col-md-4">
            <label>Presentation Skill</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.presentationSkills}"
                   class="form-control">
        </div>
        
        <div class="col-md-4">
            <label>Communication Skill</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.communicationSkills}"
                   class="form-control">
        </div>
        
        <div class="col-md-4">
            <label>Negotiation Skills(Win-Win)</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.negotiationSkills}"
                   class="form-control">
        </div>
        
        

        <div class="col-md-4">
            <label>Problem Solving Skill</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.problemSolvingSkills}"
                   class="form-control">
        </div>

        <div class="col-md-4">
            <label>Motivational Skill</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.motivationalSkills}"
                   class="form-control">
        </div>
        
          <div class="col-md-4">
            <label>Punctuality</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.punctuality}"
                   class="form-control">
        </div>

        <div class="col-md-4">
            <label>Classroom Time Management</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.classroomTimemanagement}"
                   class="form-control">
        </div>

    </div>

    <!-- ================= Engagement of Learners ================= -->
    <h5 class="mt-5">Engagement of Learners</h5>
    <div class="row g-3">


        <div class="col-md-4">
            <label>Opening & Closing of Class(Effectiveness)</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.openingclosingofClass}"
                   class="form-control">
        </div>
        
        <div class="col-md-4">
            <label>Learners Attention Grasping Capacity</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.learnersagCapacity}"
                   class="form-control">
        </div>
        
        <div class="col-md-4">
            <label>Using Formattive Assessment</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.usingFormattiveassessment}"
                   class="form-control">
        </div>
        
        <div class="col-md-4">
            <label>Use of Worksheets for HW</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.useworksheetHw}"
                   class="form-control">
        </div>
        
        <div class="col-md-4">
            <label>Use of social media to clarify content to learners</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.usesocialmediaLearners}"
                   class="form-control">
        </div>

        <div class="col-md-4">
            <label>Knowledge & Use of Teaching Aids</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.useTeachingaids}"
                   class="form-control">
        </div>

    </div>


    <!-- ================= Effectiveness of Educating Skills & Outcome in your past Experience(s)  ================= -->
    <h5 class="mt-5">Effectiveness of Educating Skills & Outcome in your past Experience(s)</h5>
    <div class="row g-3">

          
          <div class="col-md-4">
            <label>Avg. Score of Learners in C/W</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.scoreCw}"
                   class="form-control">
        </div>
        
        
         <div class="col-md-4">
            <label>Avg. Score of Learners in H/W</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.scoreHw}"
                   class="form-control">
        </div>
        
        
        <div class="col-md-4">
            <label>Avg. Score of Learners in Unit Assessment</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.scoreUnitassessment}"
                   class="form-control">
        </div>
        
        <div class="col-md-4">
            <label>Knowledge</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.knowledge}"
                   class="form-control">
        </div>
        
        
        <div class="col-md-4">
            <label>Understanding</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.understanding}"
                   class="form-control">
        </div>
        
        
         <div class="col-md-4">
            <label>Application</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.application}"
                   class="form-control">
        </div>
        
        
        <div class="col-md-4">
            <label>Higher Ability</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.higherAbility}"
                   class="form-control">
        </div>
        
        
        
         

    </div>
    
     <!-- ================= Management System & Policy Adherence  ================= -->
    <h5 class="mt-5">Management System & Policy Adherence</h5>
    <div class="row g-3">

          
        
         <div class="col-md-4">
            <label>Social Media Handling</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.socialmediaHandling}"
                   class="form-control">
        </div>
      
         

         <div class="col-md-4">
            <label>Documentation & Record Keeping</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.recordKeeping}"
                   class="form-control">
        </div>
        
        
        
         <div class="col-md-4">
            <label>Implementation of Corporate Policies, SOPs, KPIs, JDs</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.implementationCorporatepolicies}"
                   class="form-control">
        </div>

    </div>
    
    
     <!-- ================= Management System & Policy Adherence  ================= -->
    <h5 class="mt-5">Management System & Policy Adherence</h5>
    <div class="row g-3">

          
        
         <div class="col-md-4">
            <label>Frequency of consuming any socially restricted elements</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.consumingRestrictedelements}"
                   class="form-control">
        </div>
      

        <div class="col-md-4">
            <label>Personal Hygiene</label>
            <input type="number" min="1" max="5"
                   th:field="*{capabilityRating.personalHygiene}"
                   class="form-control">
        </div>

    </div>

    <div class="mt-5 text-end">
        <button type="submit" class="btn btn-success">
            Submit Final Form
        </button>
    </div>

</form>

</body>
</html>
