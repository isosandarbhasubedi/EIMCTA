<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Principal Progress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h3>Principal Form Progress</h3>
<hr>

<div class="list-group">

    <div th:each="i : ${#numbers.sequence(1,7)}"
         class="list-group-item d-flex justify-content-between align-items-center">

        <span>Section [[${i}]]</span>

        <!-- COMPLETED -->
        <span th:if="${i <= principal.completedSection}"
              class="badge bg-success">
            Completed ✓
           
        </span>
        <div class="mt-4" th:if="${principal.formCompleted}">
    <div class="alert alert-success">
       <a th:href="@{/admin/principal/{userId}/section/{sec}/edit(userId=${principal.user.id},sec=${i})}"
   class="btn btn-warning btn-sm">
    Edit
</a>
    </div>
</div>

        <!-- CURRENT -->
        <a th:if="${i == principal.currentSection && !principal.formCompleted}"
           th:href="@{/admin/principal/{id}/section/{sec}(id=${principal.user.id}, sec=${i})}"
           class="btn btn-primary btn-sm">
            Start
        </a>

        <!-- LOCKED -->
        <span th:if="${i > principal.currentSection}"
              class="badge bg-secondary">
            Locked 🔒
           
        </span>

    </div>

</div>

<div class="mt-4" th:if="${principal.formCompleted}">
    <div class="alert alert-success">
        🎉 All Sections Completed!
    </div>
</div>

</body>
</html>
