<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Province Users</title>
</head>
<body>

<h2>Province Level Users</h2>

<div th:if="${param.error == 'lastHead'}" style="color:red;">
    Cannot deactivate the last active Province Head of a province.
</div>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Role</th>
        <th>Province</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    <tr th:each="u : ${users}">
        <td th:text="${u.id}"></td>
        <td th:text="${u.username}"></td>
        <td th:text="${u.email}"></td>
        <td th:text="${u.role}"></td>
        <td th:text="${u.province != null ? u.province.name : ''}"></td>
        <td th:text="${u.active ? 'Active' : 'Inactive'}"></td>
        <td>
         <a th:href="@{/admin/province-users/edit(id=${u.id})}">
        Edit
    </a>
    |
            <a th:href="@{/admin/province-users/toggle(id=${u.id})}">
                <span th:text="${u.active ? 'Deactivate' : 'Activate'}"></span>
            </a>
            
            |
    <a th:href="@{/admin/province-users/delete(id=${u.id})}"
       onclick="return confirm('Are you sure you want to delete this user?');">
        Delete
    </a>
        </td>
    </tr>
</table>

</body>
</html>
