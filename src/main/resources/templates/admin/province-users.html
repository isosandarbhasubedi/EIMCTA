<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Admin | Province Users</title>
</head>

<body>
<section class="admin-province-users-section">

    <!-- Page Header -->
    <div class="admin-section-header">
        <h1>Province Level Users</h1>
        <a th:href="@{/admin/province-users/create}" class="btn btn-add">Add New User</a>
    </div>

    <!-- Alert -->
    <div th:if="${param.error == 'lastHead'}" class="alert">
        Cannot deactivate the last active Province Head of a province.
    </div>

    <!-- Users Table -->
    <div class="users-card admin-province-users-card">
        <table class="admin-province-users-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Province</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.username}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.role}"></td>
                    <td th:text="${u.province != null ? u.province.name : ''}"></td>

                    <!-- Status Badge -->
                    <td>
                        <span class="badge"
                              th:classappend="${u.active} ? 'active-badge' : 'inactive-badge'"
                              th:text="${u.active} ? 'Active' : 'Inactive'"></span>
                    </td>

                    <!-- Actions -->
                    <td data-label="Action">
                        <a th:href="@{/admin/province-users/edit(id=${u.id})}" class="btn btn-edit">Edit</a>
                        <p>|</p>
                        <a th:href="@{/admin/province-users/toggle(id=${u.id})}" class="btn btn-toggle"
                           th:text="${u.active} ? 'Deactivate' : 'Activate'"
                           onclick="return confirm('Are you sure you want to change this user\'s status?');">
                        </a>
                         <p>|</p>
                        <a th:href="@{/admin/province-users/delete(id=${u.id})}" class="btn btn-delete"
                           onclick="return confirm('Are you sure you want to delete this user?');">
                            Delete
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</section>
</body>
</html>
