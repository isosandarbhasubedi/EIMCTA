<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Create School</title>
</head>

<body>

<section class="ad-school-create-section">

    <div class="ad-school-create-card">

        <h2 class="ad-school-create-title">Create School</h2>

        <form th:action="@{/admin/schools/create}"
              th:object="${school}"
              method="post"
              enctype="multipart/form-data"
              class="ad-school-create-form">

            <div class="ad-school-create-grid">

                <div class="ad-school-create-group">
                    <label>School Name</label>
                    <input type="text" th:field="*{name}" required />
                </div>

                <div class="ad-school-create-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" />
                </div>

                <div class="ad-school-create-group">
                    <label>Address</label>
                    <input type="text" th:field="*{address}" required />
                </div>

                <div class="ad-school-create-group">
                    <label>Mobile Number</label>
                    <input type="text" th:field="*{mobileNumber}" />
                </div>

                <div class="ad-school-create-group">
                    <label>Landline Number</label>
                    <input type="text" th:field="*{landlineNumber}" />
                </div>

                <div class="ad-school-create-group">
                    <label>Social Media URL</label>
                    <input type="text" th:field="*{socialMediaURL}" />
                </div>

                <div class="ad-school-create-group">
                    <label>Province</label>
                    <select th:field="*{province}" required>
                        <option value="">Select Province</option>
                        <option th:each="prov : ${provinces}"
                                th:value="${prov.id}"
                                th:text="${prov.name}">
                        </option>
                    </select>
                </div>

                <div class="ad-school-create-group">
                    <label>School Logo</label>
                    <input type="file" name="logoFile" />
                </div>

            </div>

            <div class="ad-school-create-buttons">
                <button type="submit" class="ad-school-create-btn-primary">
                    Create School
                </button>

            </div>

            <div th:if="${error}" class="ad-school-create-error">
                <span th:text="${error}"></span>
            </div>

        </form>

    </div>

</section>
</body>
</html>
