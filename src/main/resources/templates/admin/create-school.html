<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create School</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1>Create School</h1>
        <a th:href="@{/admin/dashboard}">Back to Dashboard</a>
    </header>

    <div class="form-container">
        <form th:action="@{/admin/schools/create}" th:object="${school}" method="post" enctype="multipart/form-data">
            
            <div>
                <label>School Name:</label>
                <input type="text" th:field="*{name}" placeholder="Enter school name" required />
            </div>

            <div>
                <label>Address:</label>
                <input type="text" th:field="*{address}" placeholder="Enter address" required />
            </div>

            <div>
                <label>Email:</label>
                <input type="email" th:field="*{email}" placeholder="Enter email" />
            </div>

            <div>
                <label>Mobile Number:</label>
                <input type="text" th:field="*{mobileNumber}" placeholder="Enter mobile number" />
            </div>

            <div>
                <label>Landline Number:</label>
                <input type="text" th:field="*{landlineNumber}" placeholder="Enter landline number" />
            </div>

            <div>
                <label>Social Media URL:</label>
                <input type="text" th:field="*{socialMediaURL}" placeholder="Enter social media link" />
            </div>

            <div>
                <label>Province:</label>
                <select th:field="*{province}" required>
                    <option value="">Select Province</option>
                    <option th:each="prov : ${provinces}" th:value="${prov.id}" th:text="${prov.name}"></option>
                </select>
            </div>

            <div>
                <label>School Logo:</label>
                <input type="file" name="logoFile" />
            </div>

            <div>
                <button type="submit">Create School</button>
            </div>

            <div th:if="${error}">
                <p style="color:red;" th:text="${error}"></p>
            </div>

        </form>
    </div>
</body>
</html>
