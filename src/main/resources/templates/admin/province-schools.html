<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Schools in Province</title>
</head>

<body>

<section class="ad-province-schools-section">

    <div class="ad-province-schools-card">

        <!-- Header -->
        <div class="ad-province-schools-header">
            <h2>
                Schools in Province:
                <span th:text="${province.name}"></span>
            </h2>

            <a th:href="@{/admin/provinces}"
               class="ad-province-schools-btn-back">
                ← Back to Provinces
            </a>
        </div>

        <!-- Table -->
        <div class="ad-province-schools-table-wrapper">
            <table class="ad-province-schools-table">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Logo</th>
                    <th>School Name</th>
                    <th>Address</th>
                    <th>Email</th>
                    <th>Mobile</th>
                    <th>Status</th>
                    <th>Users</th>
                    <th>Manage</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="school : ${schools}">

                    <td th:text="${school.id}"></td>

                    <td>
                        <img th:if="${school.logo != null}"
                             th:src="@{'/uploads/' + ${school.logo}}"
                             class="ad-province-schools-logo"/>

                        <span th:if="${school.logo == null}"
                              class="ad-province-schools-no-logo">
                              No Logo
                        </span>
                    </td>

                    <td th:text="${school.name}"></td>
                    <td th:text="${school.address}"></td>
                    <td th:text="${school.email}"></td>
                    <td th:text="${school.mobileNumber}"></td>

                    <td>
                        <span th:text="${school.active ? 'Active' : 'Restricted'}"
                              th:classappend="${school.active ? ' ad-province-schools-status-active' : ' ad-province-schools-status-restricted'}"
                              class="ad-province-schools-status">
                        </span>
                    </td>

                    <td>
                        <a th:href="@{'/admin/schools/' + ${school.id} + '/users'}"
                           class="ad-province-schools-btn-view">
                            View Users
                        </a>
                    </td>

                    <td class="ad-province-schools-actions">

                        <a th:if="${school.active}"
                           th:href="@{'/admin/schools/restrict/' + ${school.id}}"
                           class="ad-province-schools-btn-restrict"
                           onclick="return confirm('Restrict this school? All users will be blocked.')">
                           Restrict
                        </a>

                        <a th:if="${!school.active}"
                           th:href="@{'/admin/schools/enable/' + ${school.id}}"
                           class="ad-province-schools-btn-enable"
                           onclick="return confirm('Enable this school? Users can log in.')">
                           Enable
                        </a>

                        <a th:href="@{'/admin/schools/edit/' + ${school.id}}"
                           class="ad-province-schools-btn-edit">
                           Edit
                        </a>

                    </td>

                </tr>
                </tbody>

            </table>
        </div>

    </div>

</section>

</body>
</html>
