<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Province List</title>
</head>

<body>

<section class="ad-province-list-section">

    <div class="ad-province-list-card">

        <!-- Header -->
        <div class="ad-province-list-header">
            <h2>Province List</h2>

            <a th:href="@{/admin/provinces/create}"
               class="ad-province-list-btn-create">
                + Add Province
            </a>
        </div>

        <!-- Table -->
        <div class="ad-province-list-table-wrapper">
            <table class="ad-province-list-table">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Province Name</th>
                        <th>Number of Schools</th>
                        <th>Schools</th>
                        <th>Manage</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="province : ${provinces}">

                        <td th:text="${province.id}"></td>

                        <td th:text="${province.name}"></td>

                        <td th:text="${province.schools != null ? province.schools.size() : 0}"></td>

                        <td>
                            <a th:href="@{'/admin/provinces/' + ${province.id} + '/schools'}"
                               class="ad-province-list-link-view">
                                View Schools
                            </a>
                        </td>

                        <td class="ad-province-list-actions">

                            <a th:href="@{'/admin/provinces/edit/' + ${province.id}}"
                               class="ad-province-list-btn-edit">
                                Edit
                            </a>

                            <a th:href="@{'/admin/provinces/delete/' + ${province.id}}"
                               class="ad-province-list-btn-delete"
                               onclick="return confirm('Are you sure you want to delete this province?');">
                                Delete
                            </a>

                        </td>

                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</section>

</body>
</html>
