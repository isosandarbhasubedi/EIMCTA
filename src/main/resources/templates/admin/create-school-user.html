<!-- src/main/resources/templates/admin/create-user.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Create School User</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

   
     
 
</head>

<body>
<section class="acu-page">

    <div class="acu-header">
        <h1>Create User</h1>
    </div>

    <div class="acu-center-wrapper">
        <div class="acu-card">

            <form th:action="@{|/admin/schools/${school.id}/users/create|}"
                  th:object="${user}"
                  method="post">

                <div class="acu-form-group">
                    <label>Full Name</label>
                    <input type="text"
                           th:field="*{username}"
                           placeholder="Enter full name"
                           required />
                </div>

                <div class="acu-form-group">
                    <label>Email</label>
                    <input type="email"
                           th:field="*{email}"
                           placeholder="Enter email"
                           required />
                </div>

                <div class="acu-form-group acu-password-group">
                    <label>Password</label>
                    <div class="acu-password-wrapper">
                        <input type="password"
                               th:field="*{password}"
                               id="acu-password"
                               placeholder="Enter password"
                               required />
                        <span class="acu-toggle" onclick="togglePassword()">👁</span>
                    </div>
                </div>

                <div class="acu-form-group">
                    <label>Role</label>
                    <select name="role" required>
                        <option value="" disabled selected>Select Role</option>
                        <option th:each="r : ${roles}"
                                th:value="${r}"
                                th:text="${r}">
                        </option>
                    </select>
                </div>

                <button type="submit" class="acu-btn">Create User</button>

                <div th:if="${error}" class="acu-error">
                    <p th:text="${error}"></p>
                </div>

            </form>

        </div>
    </div>
<script>
function togglePassword() {
    const passwordInput = document.getElementById("acu-password");
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
    } else {
        passwordInput.type = "password";
    }
}
</script>
</section>




</body>
</html>
