<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
       th:replace="~{admin/admin-layout :: layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Edit Province User</title>
</head>
<body>

<section class="edit-province-user-card">

    <div class="page-header">
        <h1>Edit Province User</h1>
        <a th:href="@{/admin/province-users}" class="back-btn">Back To Users</a>
    </div>

    <div class="form-container">
        <form th:action="@{/admin/province-users/edit}"
              th:object="${user}"
              method="post">

            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label>Username</label>
                <input type="text" th:field="*{username}" required />
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" required />
            </div>

            <div class="form-group">
                <label>Role</label>
                <select th:field="*{role}" required>
                    <option value="PROVINCE_HEAD">Province Head</option>
                    <option value="CONSULTANT">Consultant</option>
                    <option value="CRO">CRO</option>
                    <option value="EDEO">EDEO</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="update-btn">Update</button>
            </div>

        </form>
    </div>

</section>

</body>
</html>
