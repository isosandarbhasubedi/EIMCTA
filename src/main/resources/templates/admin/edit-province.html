<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Edit Province</title>
</head>

<body>

<section class="ad-province-edit-section">

    <div class="ad-province-edit-card">

        <!-- Header -->
        <div class="ad-province-edit-header">
            <h2>Edit Province</h2>

            <a th:href="@{/admin/provinces}"
               class="ad-province-edit-btn-back">
                ← Back to List
            </a>
        </div>

        <!-- Form -->
        <form th:action="@{'/admin/provinces/update/' + ${province.id}}"
              th:object="${province}"
              method="post"
              class="ad-province-edit-form">

            <div class="ad-province-edit-group">
                <label>Province Name</label>
                <input type="text"
                       th:field="*{name}"
                       placeholder="Enter province name"
                       required />
            </div>

            <div class="ad-province-edit-buttons">
                <button type="submit"
                        class="ad-province-edit-btn-update">
                    Update Province
                </button>
            </div>

            <div th:if="${error}"
                 class="ad-province-edit-error">
                <span th:text="${error}"></span>
            </div>

        </form>

    </div>

</section>

</body>
</html>
