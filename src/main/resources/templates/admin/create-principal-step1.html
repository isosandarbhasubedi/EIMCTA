<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Principal - Step 1</title>

    <!-- Bootstrap CSS (optional, for styling) -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    
    <!-- Nepali Datepicker CSS -->
    <link href="https://nepalidatepicker.sajanmaharjan.com.np/v5/nepali.datepicker/css/nepali.datepicker.v5.0.6.min.css" rel="stylesheet" type="text/css"/>
    
    <style>
        .bs-calendar {
            cursor: pointer;
            font-size: 20px;
            margin-left: 5px;
            display: inline-flex;
            align-items: center;
        }
        .date-input-group {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

<section class="ad-principal-create-section">

    <div class="ad-principal-create-card">

        <!-- Header -->
        <div class="ad-principal-create-header">
            <h2>Create Principal Profile - Step 1</h2>
            <a th:href="@{/admin/schools}" class="ad-principal-create-btn-back">← Back to Schools</a>
        </div>

        <form th:action="@{/admin/principal/{schoolId}/step1(schoolId=${schoolId})}" 
              th:object="${principal}" 
              method="post">

            <!-- 🔹 Section 1A: Personal Information -->
            <fieldset class="ad-principal-section">
                <legend>Personal Information</legend>

                <div class="form-group">
                    <label>Title</label>
                    <select th:field="*{personalInfo.title}" class="form-control" required>
                        <option value="" disabled>Select Title</option>
                        <option value="Mr.">Mr.</option>
                        <option value="Mrs.">Mrs.</option>
                        <option value="Miss.">Miss.</option>
                        <option value="Ms.">Ms.</option>
                        <option value="Er.">Er.</option>
                        <option value="Dr.">Dr.</option>
                        <option value="Prof.">Prof.</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{personalInfo.firstName}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>SurName</label>
                    <input type="text" th:field="*{personalInfo.surName}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Maiden Name</label>
                    <input type="text" th:field="*{personalInfo.maidenName}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <select th:field="*{personalInfo.gender}" class="form-control" required>
                        <option value="" disabled>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Date of Birth AD -->
                <div class="form-group">
                    <label>Date of Birth (AD)</label>
                    <input type="date" th:field="*{personalInfo.dateOfBirth}" class="form-control" required>
                </div>

                <!-- Date of Birth BS with Calendar Emoji -->
                <div class="form-group">
                    <label>Date of Birth (BS)</label>
                    <div class="date-input-group">
                        <input type="text"
                               id="dateOfBirthNepali"
                               th:field="*{personalInfo.dateOfBirthNepali}"
                               class="form-control"
                               placeholder="YYYY-MM-DD"
                               maxlength="10">
                        <span class="bs-calendar">📅</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Citizenship Number</label>
                    <input type="text" th:field="*{personalInfo.citizenshipNumber}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Issued District</label>
                    <input type="text" th:field="*{personalInfo.issuedDistrict}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Pan Number</label>
                    <input type="text" th:field="*{personalInfo.panNumber}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" th:field="*{personalInfo.contactNumber}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Emergency Contact Number</label>
                    <input type="text" th:field="*{personalInfo.emergencyContactNumber}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Social Media ID</label>
                    <input type="text" th:field="*{personalInfo.socialmediaId}" class="form-control">
                </div>

                <div class="form-group">
                    <label>Preferred Communication</label>
                    <select th:field="*{personalInfo.preferredCommunication}" class="form-control" required>
                        <option value="" disabled>Select Communication Ways</option>
                        <option value="SMS">SMS</option>
                        <option value="Whatsapp">Whatsapp</option>
                        <option value="Email">Email</option>
                        <option value="Call">Call</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Permanent Address</label>
                    <input type="text" th:field="*{personalInfo.permanentAddress}" class="form-control" required>
                </div>
            </fieldset>

            <!-- 🔹 Section 1B: Family Information -->
            <fieldset class="ad-principal-section">
                <legend>Family Information</legend>

                <div class="form-group">
                    <label>Marital Status</label>
                    <select th:field="*{familyInfo.maritalStatus}" class="form-control" required>
                        <option value="" disabled>Select Status</option>
                        <option value="UnMarried">UnMarried</option>
                        <option value="Married">Married</option>
                        <option value="Single Father/Mom">Single Father/Mom</option>
                        <option value="Divorced">Divorced</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Blood Group</label>
                    <input type="text" th:field="*{familyInfo.bloodGroup}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Dependent</label>
                    <select th:field="*{familyInfo.dependent}" class="form-control" required>
                        <option value="" disabled>Select Dependent</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Spouse Name</label>
                    <input type="text" th:field="*{familyInfo.spouseName}" class="form-control">
                </div>

                <div class="form-group">
                    <label>Family Status</label>
                    <input type="text" th:field="*{familyInfo.familyStatus}" class="form-control">
                </div>

                <div class="form-group">
                    <label>Number of Children</label>
                    <select th:field="*{familyInfo.childrenNumber}" class="form-control" required>
                        <option value="" disabled>Select Children Number</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Number of Dependent</label>
                    <select th:field="*{familyInfo.dependentNumber}" class="form-control" required>
                        <option value="" disabled>Select Dependent Number</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Emergency Contact Number</label>
                    <input type="text" th:field="*{familyInfo.emergencyContact}" class="form-control">
                </div>

                <div class="form-group">
                    <label>Active Earners</label>
                    <select th:field="*{familyInfo.activeEarners}" class="form-control">
                        <option value="" disabled>Select Active Earners</option>
                        <option value="Wife/Husband">Wife/Husband</option>
                        <option value="Brother">Brother</option>
                        <option value="Sister">Sister</option>
                    </select>
                </div>
            </fieldset>

            <!-- Navigation Buttons -->
            <div class="ad-principal-form-buttons">
                <button type="submit" class="btn btn-primary">Next →</button>
            </div>

        </form>

    </div>
</section>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Nepali Datepicker JS -->
<script src="https://nepalidatepicker.sajanmaharjan.com.np/v5/nepali.datepicker/js/nepali.datepicker.v5.0.6.min.js" type="text/javascript"></script>

<script>
$(document).ready(function () {
    // Initialize Nepali Datepicker
    $('#dateOfBirthNepali').nepaliDatePicker({
        ndpYear: true,
        ndpMonth: true,
        dateFormat: 'yyyy-mm-dd',
        ndpTriggerButton: false
    });

    // Emoji click opens calendar
    $('.bs-calendar').click(function () {
        $('#dateOfBirthNepali').focus();
    });

    // Auto-insert dashes as user types
    $('#dateOfBirthNepali').on('input', function () {
        let val = this.value.replace(/\D/g, '');
        if (val.length >= 4) val = val.slice(0, 4) + '-' + val.slice(4);
        if (val.length >= 7) val = val.slice(0, 7) + '-' + val.slice(7, 9);
        this.value = val;
    });
});
</script>

</body>
</html>
