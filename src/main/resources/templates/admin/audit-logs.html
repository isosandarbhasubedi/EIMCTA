<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Audit Logs</title>
</head>
<body>

<h2>System Audit Logs</h2>

<a th:href="@{/admin/dashboard}">
    Back to Dashboard
</a>

<br><br>

<!-- 🔎 FILTER SECTION -->
<form th:action="@{/admin/audit-logs}" method="get">

    <label><b>Filter by Action:</b></label>

    <select name="action">

        <option value="">-- Show All --</option>

        <option value="CREATE_USER"
                th:selected="${selectedAction == 'CREATE_USER'}">
            CREATE_USER
        </option>

        <option value="EDIT_USER_PROFILE"
                th:selected="${selectedAction == 'EDIT_USER_PROFILE'}">
            EDIT_USER_PROFILE
        </option>

        <option value="ROLE_CHANGED"
                th:selected="${selectedAction == 'ROLE_CHANGED'}">
            ROLE_CHANGED
        </option>

        <option value="DELETE_USER"
                th:selected="${selectedAction == 'DELETE_USER'}">
            DELETE_USER
        </option>

        <option value="USER_ACTIVATED"
                th:selected="${selectedAction == 'USER_ACTIVATED'}">
            USER_ACTIVATED
        </option>

        <option value="USER_DEACTIVATED"
                th:selected="${selectedAction == 'USER_DEACTIVATED'}">
            USER_DEACTIVATED
        </option>

        <option value="RESTORE_USER"
                th:selected="${selectedAction == 'RESTORE_USER'}">
            RESTORE_USER
        </option>

    </select>

    <button type="submit">Filter</button>

</form>

<br><br>

<!-- 📋 AUDIT TABLE -->
<table border="1">

    <tr>
        <th>ID</th>
        <th>Action</th>
        <th>Entity</th>
        <th>Entity ID</th>
        <th>Performed By</th>
        <th>Time</th>
        <th>Details</th>
        <th>IP address</th>
    </tr>

    <tr th:each="log : ${logs}">
        <td th:text="${log.id}"></td>
        <td th:text="${log.action}"></td>
        <td th:text="${log.entityType}"></td>
        <td th:text="${log.entityId}"></td>
        <td th:text="${log.performedBy}"></td>
        <td th:text="${log.performedAt}"></td>
        <td th:text="${log.details}"></td>
        <td th:text="${log.ipAddress}"></td>
    </tr>

</table>

</body>
</html>
