<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
     th:replace="~{admin/admin-layout :: layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Create HQ User</title>
</head>
<body>

<section class="create-company-user-card">

    <div class="page-header">
        <h1>Create HQ Users</h1>
    </div>

    <div class="form-container">
        <form th:action="@{/admin/company-users/create}"
              method="post"
              th:object="${user}">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text"
                       th:field="*{username}"
                       placeholder="Enter full name"
                       required />
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email"
                       th:field="*{email}"
                       placeholder="Enter email"
                       required />
            </div>

            <div class="form-group password-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password"
                           th:field="*{password}"
                           id="password"
                           placeholder="Enter password"
                           required />
                    <span class="toggle-password"
                          onclick="togglePassword()">Show</span>
                </div>
            </div>

            <div class="form-group">
                <label>Role</label>
                <select th:field="*{role}" required>
                    <option value="" disabled selected>Select Role</option>
                    <option th:each="r : ${roles}"
                            th:value="${r}"
                            th:text="${r}">
                    </option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="create-btn">Create User</button>
            </div>

        </form>
    </div>
<script>
    function togglePassword() {
        const passwordInput = document.getElementById("password");
        const toggleText = document.querySelector(".toggle-password");

        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            toggleText.textContent = "Hide";
        } else {
            passwordInput.type = "password";
            toggleText.textContent = "Show";
        }
    }
</script>

</section>

</body>
</html>
