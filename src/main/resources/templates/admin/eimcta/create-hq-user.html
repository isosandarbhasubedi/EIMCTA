<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
</head>
<body>
<form th:action="@{/admin/company-users/create}" method="post" th:object="${user}">
    
   <div>
                <label>Full Name:</label>
                <input type="text" th:field="*{username}" placeholder="Enter full name" required />
            </div>

            <div>
                <label>Email:</label>
                <input type="email" th:field="*{email}" placeholder="Enter email" required />
            </div>

            <div>
                <label>Password:</label>
                <input type="password" th:field="*{password}" placeholder="Enter password" required />
            </div>
          <div>
                <label>Role:</label>
                <select name="role" required>
                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                </select>
            </div>

         <div>
                <button type="submit">Create User</button>
            </div>

</form>

</body>
</html>
