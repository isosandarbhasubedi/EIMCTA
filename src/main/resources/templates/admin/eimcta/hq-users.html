<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>HQ Users</title>
</head>
<body>

<section class="hq-users-card">

    <div class="page-header">
        <h1>HQ Users (HR, SALES, ACCOUNT)</h1>

    </div>

    <div class="table-responsive">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th style="width:220px;">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.username}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.role}"></td>

                    <td>
                        <span th:classappend="${u.active} ? 'status-badge active' : 'status-badge inactive'"
                              th:text="${u.active ? 'Active' : 'Inactive'}">
                        </span>
                    </td>

                    <td class="action-cell">
                        <a th:href="@{/admin/hq-users/edit(id=${u.id})}" class="action-link edit-link">
                            Edit
                        </a>

                        <span class="action-pipe">|</span>

                        <a th:href="@{/admin/hq-users/toggle(id=${u.id})}"
                           class="action-link toggle-link">
                            <span th:text="${u.active ? 'Deactivate' : 'Activate'}"></span>
                        </a>

                        <span class="action-pipe">|</span>

                        <a th:href="@{/admin/hq-users/delete(id=${u.id})}"
                           class="action-link delete-link"
                           onclick="return confirm('Are you sure you want to delete this user?');">
                            Delete
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="6" style="text-align:center;">
                        No HQ users found.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</section>

</body>
</html>
