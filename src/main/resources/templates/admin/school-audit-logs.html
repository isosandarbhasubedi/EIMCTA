<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>School Logs</title>
</head>
<body>

<section class="admin-school-log-card">

    <div class="page-header">
        <h1>School Logs</h1>
        <a th:href="@{/admin/dashboard}" class="back-btn">Back to Dashboard</a>
    </div>

    <!-- 🔎 FILTER SECTION -->
    <div class="filter-container">
        <form th:action="@{/admin/school-audit-logs}" method="get">
            <div class="filter-group">
                <label>Filter by Action</label>

                <select name="action">
                    <option value="" th:selected="${selectedAction == null or selectedAction == ''}">All</option>
                    <option value="CREATE_SCHOOL" th:selected="${selectedAction == 'CREATE_SCHOOL'}">CREATE_SCHOOL</option>
                    <option value="EDIT_SCHOOL" th:selected="${selectedAction == 'EDIT_SCHOOL'}">EDIT_SCHOOL</option>
                    <option value="ACTIVATE_SCHOOL" th:selected="${selectedAction == 'ACTIVATE_SCHOOL'}">ACTIVATE_SCHOOL</option>
                    <option value="DEACTIVATE_SCHOOL" th:selected="${selectedAction == 'DEACTIVATE_SCHOOL'}">DEACTIVATE_SCHOOL</option>
                    <option value="DELETE_SCHOOL" th:selected="${selectedAction == 'DELETE_SCHOOL'}">DELETE_SCHOOL</option>
                    <option value="RESTORE_SCHOOL" th:selected="${selectedAction == 'RESTORE_SCHOOL'}">RESTORE_SCHOOL</option>
                </select>

                <button type="submit" class="filter-btn">Filter</button>
            </div>
        </form>
    </div>

    <!-- 📋 AUDIT TABLE -->
    <div class="table-responsive">
        <table class="admin-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Action</th>
                <th>Entity Type</th>
                <th>Entity ID</th>
                <th>Performed By</th>
                <th>IP Address</th>
                <th>Details</th>
                <th>Date & Time</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="log : ${schoolAuditLogs}">
                <td th:text="${log.id}"></td>
                <td th:text="${log.action}"></td>
                <td th:text="${log.entityType}"></td>
                <td th:text="${log.entityId}"></td>
                <td th:text="${log.performedBy}"></td>
                <td th:text="${log.ipAddress}"></td>
                <td th:text="${log.details}"></td>
                <td th:text="${log.performedAt}"></td>
            </tr>

            <tr th:if="${#lists.isEmpty(schoolAuditLogs)}">
                <td colspan="8" style="text-align:center;">No audit logs found.</td>
            </tr>
            </tbody>
        </table>
    </div>

</section>

</body>
</html>
