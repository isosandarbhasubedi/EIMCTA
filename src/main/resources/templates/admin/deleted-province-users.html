<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Deleted Province Users</title>
</head>
<body>

<section class="deleted-province-users-card">

    <div class="page-header">
        <h1>Deleted Province Users</h1>
        <a th:href="@{/admin/province-users}" class="back-btn">⟵Back to Active Users</a>
    </div>

    <div class="table-responsive">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Province</th>
                    <th>Deleted By</th>
                    <th>Deleted At</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.username}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.role}"></td>
                    <td th:text="${u.province != null ? u.province.name : ''}"></td>
                    <td th:text="${u.deletedBy != null ? u.deletedBy.username : ''}"></td>
                    <td th:text="${u.deletedAt}"></td>
                    <td data-label="Action">
                        <a th:href="@{/admin/province-users/restore(id=${u.id})}" 
                           class="btn restore-btn"
                           onclick="return confirm('Restore this user?');">
                           Restore
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="8" style="text-align:center;">No deleted users found.</td>
                </tr>
            </tbody>
        </table>
    </div>

</section>

</body>
</html>
