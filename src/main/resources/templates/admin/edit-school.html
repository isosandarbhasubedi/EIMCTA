<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
</head>
<body>
<form th:action="@{/admin/schools/edit/{id}(id=${school.id})}" 
      th:object="${school}" 
      method="post" 
      enctype="multipart/form-data">
   
    <input type="hidden" th:field="*{id}" />

    <label>School Name:</label>
    <input type="text" th:field="*{name}" required />

    <label>Address:</label>
    <input type="text" th:field="*{address}" required />

    <label>Email:</label>
    <input type="email" th:field="*{email}" required />

    <label>Mobile Number:</label>
    <input type="text" th:field="*{mobileNumber}" required />
    
    <label>Landline Number:</label>
    <input type="text" th:field="*{landlineNumber}" required />

    <label>Logo:</label>
    <input type="file" name="logoFile" />

    <div th:if="${school.logo != null}">
        <img th:src="@{'/uploads/' + ${school.logo}}" width="80" height="80" />
    </div>

   <select name="provinceId">
    <option th:each="province : ${provinces}"
            th:value="${province.id}"
            th:text="${province.name}"
            th:selected="${school.province != null and province.id == school.province.id}">
    </option>
</select>

    <br><br>
    <button type="submit">Update School</button>
</form>


</body>
</html>
