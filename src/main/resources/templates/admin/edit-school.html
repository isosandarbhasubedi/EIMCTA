<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Edit School</title>
</head>

<body>

<section class="ad-school-edit-section">

    <div class="ad-school-edit-card">

        <!-- Header -->
        <div class="ad-school-edit-header">
            <h2>Edit School</h2>

            <a th:href="@{/admin/provinces}"
               class="ad-school-edit-btn-back">
                ← Back
            </a>
        </div>

        <!-- Form -->
        <form th:action="@{/admin/schools/edit/{id}(id=${school.id})}"
              th:object="${school}"
              method="post"
              enctype="multipart/form-data"
              class="ad-school-edit-form">

            <input type="hidden" th:field="*{id}" />

            <div class="ad-school-edit-grid">

                <div class="ad-school-edit-group">
                    <label>School Name</label>
                    <input type="text" th:field="*{name}" required />
                </div>

                <div class="ad-school-edit-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" required />
                </div>

                <div class="ad-school-edit-group">
                    <label>Address</label>
                    <input type="text" th:field="*{address}" required />
                </div>

                <div class="ad-school-edit-group">
                    <label>Mobile Number</label>
                    <input type="text" th:field="*{mobileNumber}" required />
                </div>

                <div class="ad-school-edit-group">
                    <label>Landline Number</label>
                    <input type="text" th:field="*{landlineNumber}" required />
                </div>

                <div class="ad-school-edit-group">
                    <label>Province</label>
                    <select name="provinceId">
                        <option th:each="province : ${provinces}"
                                th:value="${province.id}"
                                th:text="${province.name}"
                                th:selected="${school.province != null and province.id == school.province.id}">
                        </option>
                    </select>
                </div>

                <div class="ad-school-edit-group">
                    <label>Logo</label>
                    <input type="file" name="logoFile" />
                </div>

                <div class="ad-school-edit-logo-preview"
                     th:if="${school.logo != null}">
                    <label>Current Logo</label>
                    <img th:src="@{'/uploads/' + ${school.logo}}"
                         class="ad-school-edit-logo"/>
                </div>

            </div>

            <div class="ad-school-edit-buttons">
                <button type="submit"
                        class="ad-school-edit-btn-update">
                    Update School
                </button>
            </div>

        </form>

    </div>

</section>

</body>
</html>
