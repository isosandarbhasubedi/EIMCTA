<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Province User</title>
</head>
<body>

<h2>Create Province Company User</h2>

<form th:action="@{/provincehead/province-users/create}"
      th:object="${user}"
      method="post">

    <div>
        <label>Username:</label>
        <input type="text" th:field="*{username}" required />
    </div>

    <div>
        <label>Email:</label>
        <input type="email" th:field="*{email}" required />
    </div>

    <div>
        <label>Password:</label>
        <input type="password" th:field="*{password}" required />
    </div>

    <div>
                <label>Role:</label>
                <select name="role" required>
                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                </select>
            </div>


    <br>
    <button type="submit">Create</button>

</form>

<br>
<a th:href="@{/provincehead/province-users}">
    Back
</a>

</body>
</html>
