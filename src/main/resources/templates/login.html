<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - School Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style >
    /* =====================================
   MODERN LOGIN PAGE
===================================== */
:root {
    --primary-blue: #0b3d91;
    --dark-yellow: #d4a017;
    --light-brown: #f1e5d0;
    --white: #ffffff;
    --dark-text: #1c1c1c;
}



.login-page {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
        background : var(--light-brown);
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-page::after {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 55%;
    height: 100%;
    background: linear-gradient(135deg, #003366, #0d6efd);

    border-top-left-radius: 120px;
    border-bottom-left-radius: 120px;

    z-index: -1;
}

/* Wrapper */
.login-wrapper {
    width: 100%;
    max-width: 420px;
    padding: 20px;
}

/* Card */
.login-card {
        background:var(--light-brown);
    padding: 40px;
    border-radius: 18px;
    box-shadow: 
        0 25px 50px rgba(0,0,0,0.25),
        0 15px 25px rgba(0,0,0,0.15);
    text-align: center;
    animation: fadeInUp 0.6s ease;
}

/* Title */
.login-title {
    margin-bottom: 5px;
    font-size: 28px;
    color: #003366;
}

.login-subtitle {
    font-size: 14px;
    color: #777;
    margin-bottom: 30px;
}

/* Inputs */
.login-group {
    margin-bottom: 18px;
}

.login-group input {
    width: 100%;
    padding: 12px 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
    outline: none;
    transition: 0.3s;
}

.login-group input:focus {
    border-color: #0d6efd;
    box-shadow: 0 0 0 3px rgba(13,110,253,0.15);
}

/* Forgot Password */
.login-options {
    text-align: right;
    margin-bottom: 20px;
}

.login-options a {
    font-size: 13px;
    color: #0d6efd;
    text-decoration: none;
}

.login-options a:hover {
    text-decoration: underline;
}

.password-wrapper {
    margin-top: 15px;
}

.password-field {
    position: relative;
    display: flex;
    align-items: center;
}

.password-field input {
    width: 100%;
    padding: 10px 40px 10px 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.toggle-password {
    position: absolute;
    right: 10px;
    cursor: pointer;
    font-size: 18px;
}

/* Button */
.login-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #0d6efd;
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    background: #003366;
    transform: translateY(-2px);
}

/* Messages */
.login-message {
    margin-top: 15px;
    font-size: 14px;
    padding: 10px;
    border-radius: 6px;
}

.login-message.error {
    background: #ffe5e5;
    color: #cc0000;
}

.login-message.success {
    background: #e6ffed;
    color: #1a7f37;
}



/* Animation */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.fp-back {
    margin-top: 15px;
}

.fp-back a {
    color: blue;
    font-size: 14px;
    text-decoration: none;
}

.fp-back a:hover {
    text-decoration: underline;
}
    </style>
</head>
<body class="login-page">

    <div class="login-wrapper">

        <div class="login-card">

            <h2 class="login-title">Welcome Back</h2>
            <p class="login-subtitle">Login to continue</p>

            <form th:action="@{/login}" method="post">

                <div class="login-group">
                <label>Email:</label>
                    <input type="email" name="username"
                           placeholder="Enter your email" required />
                </div>

               <div class="password-wrapper">
    <label>Password:</label>

    <div class="password-field">
        <input type="password"
               id="password"
               name="password"
               placeholder="Enter your password"
               required />

        <span class="toggle-password"
              onclick="togglePassword()">
              👁
        </span>
    </div>
</div>

                <div class="login-options">
                    <a th:href="@{/forgot-password}">
                        Forgot Password?
                    </a>
                </div>

                <button type="submit" class="login-btn">
                    Login
                </button>

               <div class="fp-back">
               <a th:href="@{/}">← Back to Home</a>
               </div>
               
            <!-- ❌ Invalid Login -->
            <div class="login-message error" th:if="${param.error}">
                <div th:if="${session.SPRING_SECURITY_LAST_EXCEPTION != null}">
                    
                </div>
                <p style="color:red;">Invalid email or password</p>
            </div>

            <!-- 🚫 Restricted Account -->
            <div class="login-message error" th:if="${param.restricted}">
           
                    Your ID is currently not in operation.
                    Please contact EIMCTA Management.
               
            </div>

            <!-- ✅ Logout Message -->
            <div class="login-message success" th:if="${param.logout}">
                You have been logged out successfully
            </div>
    
        </form>
    </div>
    </div>
    
    <script>
    function togglePassword() {
        const passwordInput = document.getElementById("password");
        const toggleIcon = document.querySelector(".toggle-password");

        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            toggleIcon.textContent = "🙈";
        } else {
            passwordInput.type = "password";
            toggleIcon.textContent = "👁";
        }
    }
</script>
</body>
</html>
