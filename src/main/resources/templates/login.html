<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - School Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>

        <form th:action="@{/login}" method="post">
            <div>
                <label>Email:</label>
                <input type="email" name="username" placeholder="Enter your email" required />
            </div>

            <div>
                <label>Password:</label>
                <input type="password" name="password" placeholder="Enter your password" required />
            </div>

            <div>
                <button type="submit">Login</button>
            </div>

            <div th:if="${param.error}">
            <div th:if="${session.SPRING_SECURITY_LAST_EXCEPTION != null}">
        <p style="color:red;"
           th:text="${session.SPRING_SECURITY_LAST_EXCEPTION.message}">
        </p>
    </div>
                <p style="color:red;">Invalid email or password</p>
            </div>
            <div th:if="${param.restricted}">
       <p style="color:red; font-weight:bold;">
        Your ID is currently not in operation.
        Please contact EIMCTA Management.
     </p>
      </div>
            

            <div th:if="${param.logout}">
                <p style="color:green;">You have been logged out</p>
            </div>
        </form>
    </div>
</body>
</html>
