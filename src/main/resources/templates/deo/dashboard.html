<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DEO Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1>DEO Dashboard - <span th:text="${school.name}"></span></h1>
        <a th:href="@{/logout}">Logout</a>
    </header>

    <main>
        <h2>School Info</h2>
        <p><strong>Name:</strong> <span th:text="${school.name}"></span></p>
        <p><strong>Address:</strong> <span th:text="${school.address}"></span></p>

        <h2>Educators</h2>
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="educator : ${educators}">
                    <td th:text="${educator.id}"></td>
                    <td th:text="${educator.username}"></td>
                    <td th:text="${educator.email}"></td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
